palette = "custom_pallete"

[palettes.custom_pallete]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

[username]
disabled = true
style_user = "green"
style_root = "red"
format = "[$user]($style) on "

[hostname]
disabled = false
ssh_only = false
format = "[$hostname](pink):"
trim_at = "."

[character]                            
success_symbol = "[Ô×£](green) "     
error_symbol = "[Ô£ù](red) "

[directory]
read_only = " ´á¢"
truncation_length = 3
truncate_to_repo = false
truncation_symbol = "../"
style = "lavender"

[cmd_duration]
min_time = 1000
show_milliseconds = false
disabled = false
style = "italic red"
format = "took [$duration]($style)"

[aws]
symbol = "¯î¢  "

[conda]
symbol = "´äî "

[dart]
symbol = "¯×ÿ "

[docker_context]
symbol = "´îê "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "¯ëÁ "

[elm]
symbol = "¯ÿ¼ "

[git_branch]
disabled = false
style = "mauve"
symbol = "´Éÿ "

[git_status]
disabled = false
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)" 
modified = "[${count}+](yellow)" 
deleted =  "[${count}-](red)" 
conflicted =  "[${count}~](red)" 
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
untracked = "[${count}?](blue)" 
staged = "[${count}+](green)" 

[git_state]
disabled = false
style =	"red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"	
revert = "revert"	
cherry_pick = "cherry"
bisect = "bisect"	
am = "am"	
am_or_rebase = "am/rebase"

