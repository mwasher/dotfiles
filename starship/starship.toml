[username]
style_user = "green"
style_root = "red"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = ' on [$hostname](purple) '
trim_at = "."
disabled = false

[character]                            
success_symbol = "[вһң](yellow)"     
error_symbol = "[вң—](red)"

[directory]
read_only = " п Ҫ"
truncation_length = 10
truncate_to_repo = true 
style = "italic blue"

[cmd_duration]
min_time = 1000
show_milliseconds = false
disabled = false
style = "italic red"
format = "took [$duration]($style)"

[aws]
symbol = "оҢҪ  "

[conda]
symbol = "п„Ң "

[dart]
symbol = "оһҳ "

[docker_context]
symbol = "пҢҲ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
style = "yellow"
symbol = "пҗҳ "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)" 
modified = "[${count}+](yellow)" 
deleted =  "[${count}-](red)" 
conflicted =  "[${count}~](red)" 
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
untracked = "[${count}?](blue)" 
staged = "[${count}+](green)" 

[git_state]
style =	"red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"	
revert = "revert"	
cherry_pick = "cherry"
bisect = "bisect"	
am = "am"	
am_or_rebase = "am/rebase"

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[haskell]
symbol = "О» "

[memory_usage]
symbol = "пЎҡ "

[nim]
symbol = "пҡӨ "

[nix_shell]
symbol = "пӢң "

[package]
symbol = "пЈ– "

[perl]
symbol = "оқ© "

[php]
symbol = "оҳҲ "

[python]
symbol = "рҹҗҚ "
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "оҲҫ "

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "

[shlvl]
symbol = "п„  "

[swift]
