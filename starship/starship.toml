palette = "catppuccin_frappe"

[username]
disabled = true
style_user = "green"
style_root = "red"
format = "[$user]($style) on "

[hostname]
disabled = false
ssh_only = false
format = '[$hostname](purple) '
trim_at = "."

[character]                            
success_symbol = "[Ō×£](yellow)"     
error_symbol = "[Ō£Ś](red)"

[directory]
read_only = " ’ĀĮ"
truncation_length = 10
truncate_to_repo = true 
style = "italic blue"

[cmd_duration]
min_time = 1000
show_milliseconds = false
disabled = false
style = "italic red"
format = "took [$duration]($style)"

[aws]
symbol = "ŅīĮ  "

[conda]
symbol = "’äī "

[dart]
symbol = "Ņ×ś "

[docker_context]
symbol = "’īł "
