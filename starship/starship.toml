[git_status]
disabled = false
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)" 
modified = "[${count}+](yellow)" 
deleted =  "[${count}-](red)" 
conflicted =  "[${count}~](red)" 
ahead = "ŌćĪ${count}"
behind = "ŌćŻ${count}"
untracked = "[${count}?](blue)" 
staged = "[${count}+](green)" 

[git_state]
disabled = false
style =	"red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"	
revert = "revert"	
cherry_pick = "cherry"
